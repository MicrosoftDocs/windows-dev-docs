### YamlMime:ZonePivotGroups
groups:
- id: winui3-version
  title: WinUI application type
  prompt: "Choose the type of WinUI application you want to build:"
  pivots:
    - id: winui3-packaged-csharp
      title: C# packaged
    - id: winui3-unpackaged-csharp
      title: C# unpackaged
    - id: winui3-packaged-cpp
      title: C++ packaged
    - id: winui3-unpackaged-cpp
      title: C++ unpackaged
- id: winui3-version-c#-only
  title: WinUI application type
  prompt: "Choose the type of WinUI application you want to build:"
  pivots:
    - id: winui3-packaged-csharp
      title: C# packaged
    - id: winui3-unpackaged-csharp
      title: C# unpackaged
- id: winui3-language
  title: Language
  prompt: "Choose your programming language:"
  pivots:
    - id: lang-csharp
      title: C#
    - id: lang-cppwinrt
      title: C++/WinRT
- id: store-installer-packaging
  title: Store application type
  prompt: "Choose the type of app you want to publish on the Microsoft store:"
  pivots:
    - id: store-installer-msix
      title: MSIX
    - id: store-installer-msi-exe
      title: MSI or EXE
    - id: store-installer-pwa
      title: PWA
    - id: store-installer-add-on
      title: App add-on
- id: msstoredevcli-installer-packaging
  title: Microsoft Store Developer CLI Installation OS
  prompt: "Choose the type of OS you want to install the Microsoft Store Developer CLI:"
  pivots:
    - id: msstoredevcli-installer-windows
      title: Windows 10+
    - id: msstoredevcli-installer-macos
      title: macOS
    - id: msstoredevcli-installer-linux
      title: Linux
- id: wasdk-release-channels
  title: Windows App SDK release channels
  prompt: Choose release channel
  pivots:
    - id: stable
      title: Stable
    - id: preview
      title: Preview
    - id: experimental
      title: Experimental
- id: desktop-framework
  title: Desktop framework
  prompt: Choose your desktop framework
  pivots:
    - id: dotnet
      title: .NET
    - id: win32
      title: Win32 (C++)
- id: dotnet-app-type
  title: .NET app type
  prompt: Choose your .NET app type
  pivots:
    - id: wpf
      title: Windows Presentation Foundation (WPF)
    - id: winforms
      title: Windows Forms (WinForms)
