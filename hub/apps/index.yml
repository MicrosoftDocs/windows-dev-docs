additionalContent:
  sections:
    # Section
    - title: Get started requirements
      summary: "What you need to start building with the Windows App SDK. Targets Windows 10 version 1809 (build 17763) or later."
      items:
        - title: Windows App SDK (latest stable)
          summary: "Download the current stable release. Includes WinUI 3, app lifecycle APIs, windowing, and deployment tools. Check the downloads page for the latest version number."
          url: /windows/apps/windows-app-sdk/downloads
        - title: WinUI 3 (included in Windows App SDK)
          summary: "The native UI framework for Windows desktop apps. Ships as part of the Windows App SDK — no separate install needed."
          url: /windows/apps/winui/winui3
        - title: Visual Studio 2022 with Windows App SDK workload
          summary: "Install Visual Studio 2022 with the '.NET desktop development' workload and Windows App SDK extension. Alternatively, use VS Code with C# Dev Kit."
          url: /windows/apps/windows-app-sdk/set-up-your-development-environment
        - title: Supported languages and runtimes
          summary: "C# with .NET 8 or later, C++ (Win32 and C++/WinRT), Rust (via windows-rs crate). XAML is used for UI markup in WinUI 3 and WPF."
          url: /windows/apps/windows-app-sdk/system-requirements
    # Section
    - title: Tools and resources
      items:
        - title: Windows app code samples on GitHub
          summary: "Explore sample apps and code snippets that demonstrate Windows App SDK features, WinUI 3 controls, and platform APIs."
          url: /windows/apps/get-started/samples
        - title: Windows developer environment setup
          summary: "Set up your development environment with Visual Studio, Windows App SDK, Dev Home, and the Windows Subsystem for Linux."
          url: /windows/dev-environment/
        - title: Windows developer blog
          summary: "Read announcements, release updates, and deep dives from the Windows developer team."
          url: https://devblogs.microsoft.com/ifdef-windows/
        - title: Migrate from UWP to Windows App SDK
          summary: "UWP is in maintenance mode. Migrate existing UWP apps to the Windows App SDK to access current APIs and ongoing platform investment."
          url: /windows/apps/windows-app-sdk/migrate-to-windows-app-sdk/overall-migration-strategy

